<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaOm Radar 2026: Ultimate Decision Platform</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --navy: #0F172A; --accent: #3B82F6; }
        body { font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .glass-morphism { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(226, 232, 240, 1); }
        .dark .glass-morphism { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        @media print { .no-print { display: none !important; } }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { navy: '#0F172A', accent: '#3B82F6', surface: '#F1F5F9' } } } }
    </script>
</head>
<body class="bg-surface dark:bg-slate-950 transition-all duration-300 text-slate-800 dark:text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Dataset With Sub-metrics, Coordinates (for Quadrant) and TTV Matrix
        const VENDOR_DATA = [
            { id: 'manageengine', name: 'ManageEngine', group: 'Leader', mover: 'Outperformer', scores: { key: 4.6, emg: 2.0, bus: 4.3 }, prev: 4.0, markets: ['SMB', 'Enterprise'], deployment: ['SaaS', 'Physical', 'Virtual'], info: "ยอดเยี่ยมด้านความคุ้มค่าและ 3D Visualization", quadrant: {x: 2, y: 1}, sub: { key: { discovery: 4.8, visual: 4.5, traffic: 4.2 }, emg: { ebpf: 1.0, ai: 2.5, ux: 2.5 }, bus: { scale: 4.0, ease: 4.8, cost: 4.9 } }, matrix: { ttv: 'Fast', learning: 'Low' } },
            { id: 'broadcom', name: 'Broadcom', group: 'Leader', mover: 'Outperformer', scores: { key: 4.5, emg: 1.8, bus: 4.3 }, prev: 4.2, markets: ['Telcos', 'Enterprise', 'CSP'], deployment: ['SaaS', 'Physical'], info: "แพลตฟอร์มใหญ่สำหรับองค์กรระดับ Carrier", quadrant: {x: 2.5, y: -0.5}, sub: { key: { discovery: 4.5, visual: 4.2, traffic: 4.8 }, emg: { ebpf: 1.5, ai: 2.0, ux: 3.0 }, bus: { scale: 4.9, ease: 3.5, cost: 3.8 } }, matrix: { ttv: 'Slow', learning: 'Steep' } },
            { id: 'solarwinds', name: 'SolarWinds', group: 'Leader', mover: 'Fast Mover', scores: { key: 4.5, emg: 2.8, bus: 4.2 }, prev: 4.1, markets: ['CSP', 'Enterprise', 'SMB'], deployment: ['SaaS', 'Virtual'], info: "ความปลอดภัยสูงและระบบ Container ที่ดี", quadrant: {x: 4, y: 0.5}, sub: { key: { discovery: 4.7, visual: 4.0, traffic: 4.5 }, emg: { ebpf: 2.5, ai: 3.0, ux: 2.8 }, bus: { scale: 4.3, ease: 4.5, cost: 4.0 } }, matrix: { ttv: 'Fast', learning: 'Medium' } },
            { id: 'kentik', name: 'Kentik', group: 'Leader', mover: 'Fast Mover', scores: { key: 4.4, emg: 3.0, bus: 3.7 }, prev: 3.6, markets: ['CSP', 'CDN', 'Enterprise'], deployment: ['SaaS', 'Virtual'], info: "ผู้นำด้าน Cloud-native และ eBPF พร้อม AI Advisor", quadrant: {x: 5, y: -3}, sub: { key: { discovery: 4.2, visual: 4.8, traffic: 4.9 }, emg: { ebpf: 4.8, ai: 3.5, ux: 2.5 }, bus: { scale: 4.5, ease: 4.0, cost: 3.5 } }, matrix: { ttv: 'Fast', learning: 'Medium' } },
            { id: 'bluecat', name: 'BlueCat Networks', group: 'Leader', mover: 'Outperformer', scores: { key: 4.4, emg: 2.7, bus: 3.5 }, prev: 4.1, markets: ['CDN', 'Enterprise'], deployment: ['Physical', 'Virtual'], info: "โดดเด่นด้วย DNS-level insights ผสาน Flow Analysis", quadrant: {x: 6, y: -2}, sub: { key: { discovery: 4.0, visual: 4.2, traffic: 4.6 }, emg: { ebpf: 2.0, ai: 3.2, ux: 3.5 }, bus: { scale: 4.0, ease: 4.2, cost: 3.8 } }, matrix: { ttv: 'Medium', learning: 'Medium' } },
            { id: 'riverbed', name: 'Riverbed', group: 'Leader', mover: 'Fast Mover', scores: { key: 4.1, emg: 3.7, bus: 4.0 }, prev: 3.8, markets: ['CSP', 'Telcos', 'Enterprise'], deployment: ['Physical', 'SaaS', 'Virtual'], info: "แข็งแกร่งที่สุดในด้านเทคโนโลยีใหม่ (Agentic AI)", quadrant: {x: 4.5, y: -1.5}, sub: { key: { discovery: 4.0, visual: 4.5, traffic: 4.2 }, emg: { ebpf: 3.5, ai: 4.5, ux: 4.2 }, bus: { scale: 4.2, ease: 3.8, cost: 3.5 } }, matrix: { ttv: 'Medium', learning: 'Steep' } },
            { id: 'netscout', name: 'NETSCOUT', group: 'Leader', mover: 'Outperformer', scores: { key: 4.3, emg: 1.8, bus: 3.8 }, prev: 4.0, markets: ['Telcos', 'Enterprise', 'CSP'], deployment: ['Physical', 'Virtual'], info: "เชี่ยวชาญด้าน Packet Analysis ระดับลึก (ASI)", quadrant: {x: 3.5, y: 1}, sub: { key: { discovery: 4.2, visual: 4.0, traffic: 4.9 }, emg: { ebpf: 2.5, ai: 1.5, ux: 2.0 }, bus: { scale: 4.8, ease: 3.0, cost: 3.0 } }, matrix: { ttv: 'Slow', learning: 'Steep' } },
            { id: 'logicmonitor', name: 'LogicMonitor', group: 'Leader', mover: 'Fast Mover', scores: { key: 3.9, emg: 2.2, bus: 3.8 }, prev: 3.8, markets: ['CSP', 'Enterprise'], deployment: ['SaaS'], info: "SaaS ที่ขยายตัวได้ดี ใช้งานง่าย มี ecosystem กว้าง", quadrant: {x: 5.5, y: 3}, sub: { key: { discovery: 4.5, visual: 4.0, traffic: 3.5 }, emg: { ebpf: 1.5, ai: 3.0, ux: 3.5 }, bus: { scale: 4.5, ease: 4.5, cost: 4.0 } }, matrix: { ttv: 'Fast', learning: 'Low' } },
            { id: 'sciencelogic', name: 'ScienceLogic', group: 'Challenger', mover: 'Fast Mover', scores: { key: 3.8, emg: 1.8, bus: 3.8 }, prev: 3.7, markets: ['Enterprise', 'CSP'], deployment: ['SaaS', 'Virtual', 'Physical'], info: "เน้น AIOps สำหรับ Automated RCA และ Remediation", quadrant: {x: 4.5, y: -5}, sub: { key: { discovery: 4.2, visual: 3.8, traffic: 3.5 }, emg: { ebpf: 1.0, ai: 3.5, ux: 2.0 }, bus: { scale: 4.2, ease: 3.8, cost: 3.5 } }, matrix: { ttv: 'Medium', learning: 'Medium' } },
            { id: 'auvik', name: 'Auvik', group: 'Challenger', mover: 'Fast Mover', scores: { key: 2.6, emg: 1.2, bus: 3.5 }, prev: 2.5, markets: ['SMB'], deployment: ['SaaS'], info: "เหมาะสำหรับตลาด SMB เน้นความง่ายในการใช้งาน", quadrant: {x: -6, y: 6}, sub: { key: { discovery: 4.8, visual: 3.0, traffic: 2.5 }, emg: { ebpf: 0.5, ai: 1.0, ux: 2.0 }, bus: { scale: 3.0, ease: 4.9, cost: 4.5 } }, matrix: { ttv: 'Fast', learning: 'Low' } },
            { id: 'netbrain', name: 'NetBrain', group: 'Challenger', mover: 'Fast Mover', scores: { key: 2.6, emg: 1.5, bus: 3.3 }, prev: 2.5, markets: ['Enterprise'], deployment: ['Virtual'], info: "โดดเด่นด้าน No-code Automation และ Digital Twin", quadrant: {x: -7, y: 5}, sub: { key: { discovery: 4.0, visual: 4.5, traffic: 2.0 }, emg: { ebpf: 0.5, ai: 2.0, ux: 1.0 }, bus: { scale: 3.5, ease: 3.0, cost: 3.0 } }, matrix: { ttv: 'Slow', learning: 'Steep' } }
        ];

        const CHART_COLORS = ['#3B82F6', '#F43F5E', '#10B981', '#F59E0B', '#8B5CF6'];
        const CHART_BG = ['rgba(59,130,246,0.15)', 'rgba(244,63,94,0.15)', 'rgba(16,185,129,0.15)', 'rgba(245,158,11,0.15)', 'rgba(139,92,246,0.15)'];

        const STRATEGIC_PRESETS = [
            { label: 'Maturity', icon: 'shield-check', w: {key:40, emg:10, bus:50}, color: 'text-emerald-500' },
            { label: 'Innovation', icon: 'zap', w: {key:30, emg:40, bus:30}, color: 'text-purple-500' },
            { label: 'Feature Play', icon: 'layers', w: {key:60, emg:20, bus:20}, color: 'text-orange-500' },
            { label: 'Platform Play', icon: 'globe', w: {key:40, emg:20, bus:40}, color: 'text-blue-500' }
        ];

        // Custom Component: Micro Progress Bar
        const MicroBar = ({ score, colorClass }) => (
            <div className="flex items-center gap-2">
                <div className="flex-1 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                    <div className={`h-full ${colorClass}`} style={{ width: `${(score / 5) * 100}%` }}></div>
                </div>
                <span className="text-[9px] font-mono font-bold w-4 text-right">{score.toFixed(1)}</span>
            </div>
        );

        const Dashboard = () => {
            // Feature: URL State Initialization
            const getInitialState = () => {
                const params = new URLSearchParams(window.location.search);
                const v = params.get('v');
                const w = params.get('w');
                let selected = ['kentik', 'broadcom', 'solarwinds'];
                let wgts = { key: 45, emg: 15, bus: 40 };
                if (v) selected = v.split(',');
                if (w) { const [k, e, b] = w.split(',').map(Number); wgts = { key: k||45, emg: e||15, bus: b||40 }; }
                return { selected, wgts };
            };

            const initialState = getInitialState();
            const [selectedIds, setSelectedIds] = useState(initialState.selected);
            const [weights, setWeights] = useState(initialState.wgts);
            const [filterMarket, setFilterMarket] = useState('All');
            const [darkMode, setDarkMode] = useState(false);
            const [chartType, setChartType] = useState('quadrant'); // default to quadrant
            const [baselineId, setBaselineId] = useState(null); // Feature: Baseline
            const [expandedId, setExpandedId] = useState(null); // Feature: Drilldown
            const [toast, setToast] = useState('');
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => { if (darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }, [darkMode]);

            // Sync URL State
            useEffect(() => {
                const url = new URL(window.location);
                url.searchParams.set('v', selectedIds.join(','));
                url.searchParams.set('w', `${weights.key},${weights.emg},${weights.bus}`);
                window.history.replaceState({}, '', url);
                if (window.lucide) window.lucide.createIcons();
            }, [selectedIds, filterMarket, toast, darkMode, chartType, weights, baselineId, expandedId]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

            const copyShareLink = () => {
                navigator.clipboard.writeText(window.location.href);
                showToast("🔗 คัดลอกลิงก์สำหรับแชร์ให้ทีมเรียบร้อยแล้ว!");
            };

            const handleWeightChange = (key, val) => {
                const newValue = parseInt(val);
                const others = Object.keys(weights).filter(k => k !== key);
                const targetOthersSum = 100 - newValue;
                const currentOthersSum = weights[others[0]] + weights[others[1]];
                let newWeights = { ...weights, [key]: newValue };
                if (currentOthersSum > 0) {
                    newWeights[others[0]] = Math.round((weights[others[0]] / currentOthersSum) * targetOthersSum);
                    newWeights[others[1]] = targetOthersSum - newWeights[others[0]];
                } else {
                    newWeights[others[0]] = Math.floor(targetOthersSum / 2);
                    newWeights[others[1]] = targetOthersSum - newWeights[others[0]];
                }
                setWeights(newWeights);
            };

            const processedData = useMemo(() => {
                let data = VENDOR_DATA.map(v => {
                    const avg = (((v.scores.key * weights.key) + (v.scores.emg * weights.emg) + (v.scores.bus * weights.bus)) / 100);
                    return { ...v, avg: avg.toFixed(2), rawAvg: avg, yoyDiff: (avg - v.prev).toFixed(2) };
                }).filter(v => filterMarket === 'All' || v.markets.some(m => m.includes(filterMarket))).sort((a, b) => b.rawAvg - a.rawAvg);
                
                // Baseline Calculation
                if (baselineId) {
                    const baseline = data.find(v => v.id === baselineId);
                    if (baseline) {
                        data = data.map(v => ({
                            ...v,
                            gap: {
                                key: (v.scores.key - baseline.scores.key).toFixed(1),
                                emg: (v.scores.emg - baseline.scores.emg).toFixed(1),
                                bus: (v.scores.bus - baseline.scores.bus).toFixed(1),
                                avg: (v.rawAvg - baseline.rawAvg).toFixed(2)
                            }
                        }));
                    }
                }
                return data;
            }, [weights, filterMarket, baselineId]);

            // Universal Chart.js Renderer
            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                const selected = processedData.filter(v => selectedIds.includes(v.id));
                
                let config = {};

                if (chartType === 'quadrant') {
                    // Feature 1: GigaOm Scatter Quadrant
                    config = {
                        type: 'scatter',
                        data: {
                            datasets: selected.map((v, i) => ({
                                label: v.name,
                                data: [{ x: v.quadrant.x, y: v.quadrant.y, r: 8 + (v.rawAvg * 2) }], // Bubble size by score
                                backgroundColor: CHART_COLORS[i % 5],
                                borderColor: 'white',
                                borderWidth: 2,
                                pointRadius: 10,
                                pointHoverRadius: 12
                            }))
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: {
                                tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label} (Score: ${selected[ctx.datasetIndex].avg})` } },
                                legend: { position: 'top', labels: { boxWidth: 10, font: {size: 10} } }
                            },
                            scales: {
                                x: { min: -10, max: 10, title: { display: true, text: 'Feature Play <--------------------> Platform Play', font: {size: 10, weight: 'bold'}, color: '#94a3b8' }, grid: { color: (ctx) => ctx.tick.value === 0 ? (darkMode ? '#475569' : '#cbd5e1') : (darkMode ? '#1e293b' : '#f1f5f9'), lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 } },
                                y: { min: -10, max: 10, title: { display: true, text: 'Innovation <--------------------> Maturity', font: {size: 10, weight: 'bold'}, color: '#94a3b8' }, grid: { color: (ctx) => ctx.tick.value === 0 ? (darkMode ? '#475569' : '#cbd5e1') : (darkMode ? '#1e293b' : '#f1f5f9'), lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 } }
                            }
                        }
                    };
                } else {
                    // Standard Radar / Bar
                    config = {
                        type: chartType,
                        data: {
                            labels: ['Key Features', 'Emerging Tech', 'Business Criteria'],
                            datasets: selected.map((v, i) => ({
                                label: v.name,
                                data: [v.scores.key, v.scores.emg, v.scores.bus],
                                borderColor: CHART_COLORS[i % 5],
                                backgroundColor: chartType === 'bar' ? CHART_COLORS[i % 5] : CHART_BG[i % 5],
                                borderWidth: 2, pointRadius: 4, borderRadius: chartType === 'bar' ? 4 : 0
                            }))
                        },
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            scales: { 
                                r: chartType === 'radar' ? { beginAtZero: true, max: 5, grid: { color: darkMode ? '#334155' : '#E2E8F0' }, pointLabels: { font: {size: 10, family: 'Prompt'} } } : undefined,
                                y: chartType === 'bar' ? { beginAtZero: true, max: 5, grid: { color: darkMode ? '#334155' : '#E2E8F0' } } : undefined
                            },
                            plugins: { legend: { position: 'top', labels: { boxWidth: 10, font: {size: 10} } } }
                        }
                    };
                }
                chartInstance.current = new Chart(ctx, config);
            }, [selectedIds, processedData, darkMode, chartType]);

            const FormatScore = ({ value, isGap }) => {
                if (!isGap) return <span className="font-semibold text-slate-600 dark:text-slate-300">{value}</span>;
                const num = parseFloat(value);
                if (num === 0) return <span className="text-slate-400 font-bold">-</span>;
                return <span className={`font-black ${num > 0 ? 'text-emerald-500' : 'text-red-500'}`}>{num > 0 ? '+' : ''}{num}</span>;
            };

            return (
                <div className="min-h-screen flex flex-col p-3 md:p-5 gap-4 max-w-[1400px] mx-auto relative">
                    {toast && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-2 toast-animate border border-slate-700">
                            <i data-lucide="check-circle" className="w-5 h-5 text-emerald-400"></i> <span className="font-bold text-sm">{toast}</span>
                        </div>
                    )}

                    <header className="flex justify-between items-center bg-navy text-white px-6 py-4 rounded-2xl shadow-lg no-print">
                        <div className="flex items-center gap-4">
                            <div className="p-2 bg-accent/20 rounded-lg"><i data-lucide="activity" className="text-accent w-6 h-6"></i></div>
                            <div>
                                <h1 className="text-xl font-black tracking-tight">GigaOm Observability 5.0</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Ultimate Decision Platform (Interactive Quadrant)</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={copyShareLink} className="bg-slate-800 hover:bg-slate-700 px-4 py-2.5 rounded-lg font-bold text-xs flex items-center gap-2 shadow-lg transition-all text-slate-300">
                                <i data-lucide="link" className="w-4 h-4"></i> Copy Link
                            </button>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 transition-all text-slate-300"><i data-lucide={darkMode ? 'sun' : 'moon'} className="w-4 h-4"></i></button>
                            <button onClick={() => window.print()} className="bg-accent hover:bg-blue-600 px-4 py-2.5 rounded-lg font-bold text-xs flex items-center gap-2 shadow-lg transition-all active:scale-95"><i data-lucide="printer" className="w-4 h-4"></i> PRINT</button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-5 items-start">
                        {/* Control Panel */}
                        <aside className="lg:col-span-3 space-y-4 no-print sticky top-5">
                            <div className="glass-morphism p-4 rounded-2xl shadow-sm">
                                <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center gap-1.5"><i data-lucide="crosshair" className="w-3 h-3"></i> Strategic Presets</h2>
                                <div className="grid grid-cols-2 gap-2">
                                    {STRATEGIC_PRESETS.map((p, idx) => (
                                        <button key={idx} onClick={() => {setWeights(p.w); showToast(`ใช้มุมมอง: ${p.label}`);}} className="p-2 rounded-lg text-left transition-colors border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 hover:border-accent hover:bg-accent/5">
                                            <div className="text-[10px] font-bold dark:text-white flex items-center gap-1"><i data-lucide={p.icon} className={`w-3 h-3 ${p.color}`}></i> {p.label}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="glass-morphism p-4 rounded-2xl shadow-sm">
                                <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 flex items-center justify-between">
                                    <span className="flex items-center gap-1.5"><i data-lucide="sliders" className="w-3 h-3"></i> Adjust Weights</span>
                                </h2>
                                {['key', 'emg', 'bus'].map(k => (
                                    <div key={k} className="mb-3 last:mb-0">
                                        <div className="flex justify-between text-[10px] font-bold mb-1.5 uppercase"><span className="dark:text-slate-300">{k === 'key' ? 'Key Features' : k === 'emg' ? 'Emerging' : 'Business'}</span><span className="text-accent bg-accent/10 px-1.5 py-0.5 rounded">{weights[k]}%</span></div>
                                        <input type="range" className="w-full custom-slider h-1 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none" value={weights[k]} onChange={(e) => handleWeightChange(k, e.target.value)} />
                                    </div>
                                ))}
                            </div>

                            <div className="glass-morphism p-4 rounded-2xl shadow-sm flex flex-col max-h-[400px]">
                                <div className="flex justify-between items-center mb-3 shrink-0">
                                    <select className="bg-slate-100 dark:bg-slate-800 py-1 px-2 rounded-md text-xs font-bold border-none outline-none dark:text-white" onChange={(e) => setFilterMarket(e.target.value)}>
                                        <option value="All">All Markets</option><option value="Enterprise">Enterprise</option><option value="CSP">CSP / Cloud</option>
                                    </select>
                                    <span className="text-[10px] font-bold bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-md dark:text-white">{selectedIds.length}/5</span>
                                </div>
                                <div className="space-y-1.5 overflow-y-auto pr-1">
                                    {processedData.map((v, i) => {
                                        const isSelected = selectedIds.includes(v.id);
                                        return (
                                            <label key={v.id} className={`flex items-center justify-between p-2 rounded-xl cursor-pointer transition-all border ${isSelected ? 'border-accent bg-accent/5' : 'border-transparent hover:bg-slate-50 dark:hover:bg-slate-800/50'}`}>
                                                <div className="flex items-center gap-2">
                                                    <input type="checkbox" checked={isSelected} onChange={() => {
                                                        if(isSelected) setSelectedIds(selectedIds.filter(id => id !== v.id));
                                                        else if(selectedIds.length < 5) setSelectedIds([...selectedIds, v.id]);
                                                        else showToast("เปรียบเทียบได้สูงสุด 5 รายการ");
                                                    }} className="w-3.5 h-3.5 rounded-sm accent-accent" />
                                                    <span className="text-xs font-bold dark:text-white truncate max-w-[120px]">{v.name}</span>
                                                </div>
                                                {isSelected && <div className="w-2 h-2 rounded-full" style={{backgroundColor: CHART_COLORS[selectedIds.indexOf(v.id) % 5]}}></div>}
                                            </label>
                                        )
                                    })}
                                </div>
                            </div>
                        </aside>

                        <main className="lg:col-span-9 space-y-5">
                            <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
                                <div className="lg:col-span-3 glass-morphism p-5 rounded-2xl shadow-sm flex flex-col">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-black text-sm flex items-center gap-2 dark:text-white"><i data-lucide="bar-chart-2" className="text-accent w-4 h-4"></i> Visualization</h3>
                                        <div className="flex bg-slate-100 dark:bg-slate-800 p-0.5 rounded-lg no-print">
                                            <button onClick={() => setChartType('quadrant')} className={`px-3 py-1 rounded-md text-[10px] font-bold ${chartType === 'quadrant' ? 'bg-white dark:bg-slate-600 shadow text-accent dark:text-white' : 'text-slate-500'}`}>Quadrant</button>
                                            <button onClick={() => setChartType('radar')} className={`px-3 py-1 rounded-md text-[10px] font-bold ${chartType === 'radar' ? 'bg-white dark:bg-slate-600 shadow text-accent dark:text-white' : 'text-slate-500'}`}>Radar</button>
                                            <button onClick={() => setChartType('bar')} className={`px-3 py-1 rounded-md text-[10px] font-bold ${chartType === 'bar' ? 'bg-white dark:bg-slate-600 shadow text-accent dark:text-white' : 'text-slate-500'}`}>Bar</button>
                                        </div>
                                    </div>
                                    <div className="chart-container"><canvas ref={chartRef}></canvas></div>
                                </div>

                                <div className="lg:col-span-2 flex flex-col gap-5">
                                    <div className="bg-gradient-to-br from-accent to-blue-800 p-5 rounded-2xl text-white shadow-lg relative">
                                        <h3 className="font-black text-sm flex items-center gap-1.5 mb-2"><i data-lucide="award" className="w-4 h-4"></i> Gap Analysis Insight</h3>
                                        <p className="text-[11px] leading-relaxed font-medium opacity-95">
                                            {baselineId ? `โหมด Baseline: กำลังเทียบส่วนต่างกับ ${processedData.find(v=>v.id===baselineId)?.name} เพื่อหาความคุ้มค่าในการปรับเปลี่ยนระบบ` : `โหมดปกติ: แสดงคะแนนดิบตามการถ่วงน้ำหนัก แนะนำให้คลิกปุ่ม 'เป้าหมาย' ในตารางเพื่อเปิดโหมดเทียบส่วนต่าง`}
                                        </p>
                                    </div>
                                    
                                    <div className="glass-morphism p-5 rounded-2xl shadow-sm flex-1 overflow-y-auto max-h-[280px]">
                                        <h3 className="font-black text-xs mb-3 text-slate-500 uppercase tracking-widest border-b border-slate-200 dark:border-slate-700 pb-2">Selected Profiles</h3>
                                        <div className="space-y-2.5">
                                            {processedData.filter(v => selectedIds.includes(v.id)).map(v => (
                                                <div key={v.id} className="p-3 bg-slate-50 dark:bg-slate-800/80 rounded-xl border-l-2" style={{borderLeftColor: CHART_COLORS[selectedIds.indexOf(v.id) % 5]}}>
                                                    <div className="flex justify-between items-center mb-1"><span className="font-bold text-xs dark:text-white">{v.name}</span><span className="text-[8px] px-1.5 py-0.5 bg-white dark:bg-slate-700 rounded font-black uppercase dark:text-slate-300">{v.group}</span></div>
                                                    <p className="text-[9px] text-slate-500 dark:text-slate-400 line-clamp-2">{v.info}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Dense Score Table with Baseline & Drilldown */}
                            <div className="glass-morphism rounded-2xl shadow-sm overflow-hidden">
                                <div className="p-4 bg-slate-50/50 dark:bg-slate-900/50 flex justify-between items-center border-b border-slate-100 dark:border-slate-800">
                                    <div className="flex items-center gap-2">
                                        <h3 className="font-black text-sm dark:text-white">Evaluation Matrix</h3>
                                        {baselineId && <button onClick={() => setBaselineId(null)} className="text-[9px] bg-red-100 text-red-600 px-2 py-1 rounded font-bold hover:bg-red-200">Clear Baseline (X)</button>}
                                    </div>
                                    <span className="text-[9px] text-slate-400 font-bold">* คลิก ( + ) เพื่อเจาะลึก | คลิก ( 🎯 ) เพื่อตั้งเป็น Baseline</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="text-slate-400 uppercase text-[9px] font-black tracking-widest border-b border-slate-100 dark:border-slate-800/50">
                                            <tr>
                                                <th className="px-4 py-3 text-center">Action</th>
                                                <th className="px-3 py-3">Vendor</th>
                                                <th className="px-3 py-3 text-center">Key</th>
                                                <th className="px-3 py-3 text-center">Emg</th>
                                                <th className="px-3 py-3 text-center">Bus</th>
                                                <th className="px-4 py-3 text-center bg-accent/5 text-accent">{baselineId ? 'GAP (+/-)' : 'WEIGHTED AVG'}</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800/50">
                                            {processedData.filter(v => selectedIds.includes(v.id)).map((v) => (
                                                <React.Fragment key={v.id}>
                                                <tr className={`hover:bg-slate-50 dark:hover:bg-slate-800/30 ${baselineId === v.id ? 'bg-blue-50 dark:bg-blue-900/20' : ''}`}>
                                                    <td className="px-4 py-2.5 text-center">
                                                        <div className="flex justify-center gap-1">
                                                            <button onClick={() => setExpandedId(expandedId === v.id ? null : v.id)} className="p-1 text-slate-400 hover:text-accent bg-slate-100 dark:bg-slate-800 rounded"><i data-lucide={expandedId===v.id ? 'minus' : 'plus'} className="w-3 h-3"></i></button>
                                                            <button onClick={() => {setBaselineId(baselineId === v.id ? null : v.id); showToast(baselineId===v.id?'ยกเลิก Baseline':'ตั้ง Baseline แล้ว');}} className={`p-1 rounded ${baselineId===v.id ? 'bg-accent text-white' : 'text-slate-400 hover:text-accent bg-slate-100 dark:bg-slate-800'}`} title="Set as Baseline"><i data-lucide="target" className="w-3 h-3"></i></button>
                                                        </div>
                                                    </td>
                                                    <td className="px-3 py-2.5">
                                                        <div className="font-bold text-xs dark:text-white flex items-center gap-2">
                                                            <div className="w-1.5 h-1.5 rounded-full" style={{backgroundColor: CHART_COLORS[selectedIds.indexOf(v.id) % 5]}}></div> {v.name}
                                                        </div>
                                                    </td>
                                                    <td className="px-3 py-2.5 text-center text-xs"><FormatScore value={baselineId ? v.gap.key : v.scores.key} isGap={!!baselineId && baselineId !== v.id} /></td>
                                                    <td className="px-3 py-2.5 text-center text-xs"><FormatScore value={baselineId ? v.gap.emg : v.scores.emg} isGap={!!baselineId && baselineId !== v.id} /></td>
                                                    <td className="px-3 py-2.5 text-center text-xs"><FormatScore value={baselineId ? v.gap.bus : v.scores.bus} isGap={!!baselineId && baselineId !== v.id} /></td>
                                                    <td className="px-4 py-2.5 text-center bg-accent/5 text-sm"><FormatScore value={baselineId ? v.gap.avg : v.avg} isGap={!!baselineId && baselineId !== v.id} /></td>
                                                </tr>
                                                
                                                {/* Expanded Deep Dive Row */}
                                                {expandedId === v.id && (
                                                    <tr className="bg-slate-50/80 dark:bg-slate-900/30 border-b-2 border-b-accent/20">
                                                        <td colSpan="6" className="p-4">
                                                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                                                <div className="space-y-2">
                                                                    <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 border-b dark:border-slate-700 pb-1">Key Features Breakdown</div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">Discovery & Mapping</span> <MicroBar score={v.sub.key.discovery} colorClass="bg-blue-500" /></div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">Visualization</span> <MicroBar score={v.sub.key.visual} colorClass="bg-blue-500" /></div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">Traffic Analysis</span> <MicroBar score={v.sub.key.traffic} colorClass="bg-blue-500" /></div>
                                                                </div>
                                                                <div className="space-y-2">
                                                                    <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 border-b dark:border-slate-700 pb-1">Emerging Breakdown</div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">eBPF Sensor</span> <MicroBar score={v.sub.emg.ebpf} colorClass="bg-purple-500" /></div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">AI / LLM Agents</span> <MicroBar score={v.sub.emg.ai} colorClass="bg-purple-500" /></div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">End-User Exp (DEM)</span> <MicroBar score={v.sub.emg.ux} colorClass="bg-purple-500" /></div>
                                                                </div>
                                                                <div className="space-y-2">
                                                                    <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 border-b dark:border-slate-700 pb-1">Business Breakdown</div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">Scalability</span> <MicroBar score={v.sub.bus.scale} colorClass="bg-green-500" /></div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">Ease of Use</span> <MicroBar score={v.sub.bus.ease} colorClass="bg-green-500" /></div>
                                                                    <div className="text-[10px]"><span className="text-slate-500 mb-0.5 block">Cost Transparency</span> <MicroBar score={v.sub.bus.cost} colorClass="bg-green-500" /></div>
                                                                </div>
                                                                <div className="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 flex flex-col justify-center">
                                                                    <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center"><i data-lucide="briefcase" className="inline w-3 h-3 text-accent mb-0.5"></i> ROI & Complexity</div>
                                                                    <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-900 p-2 rounded mb-2">
                                                                        <span className="text-[10px] text-slate-500 font-bold">Time-to-Value:</span>
                                                                        <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded ${v.matrix.ttv === 'Fast' ? 'bg-emerald-100 text-emerald-600' : (v.matrix.ttv === 'Medium' ? 'bg-orange-100 text-orange-600' : 'bg-red-100 text-red-600')}`}>{v.matrix.ttv}</span>
                                                                    </div>
                                                                    <div className="flex justify-between items-center bg-slate-50 dark:bg-slate-900 p-2 rounded">
                                                                        <span className="text-[10px] text-slate-500 font-bold">Learning Curve:</span>
                                                                        <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded ${v.matrix.learning === 'Low' ? 'bg-emerald-100 text-emerald-600' : (v.matrix.learning === 'Medium' ? 'bg-orange-100 text-orange-600' : 'bg-red-100 text-red-600')}`}>{v.matrix.learning}</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                                </React.Fragment>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
