            const [isVisible, setIsVisible] = useState(false);
            const [coords, setCoords] = useState({ top: 0, left: 0 });
            const triggerRef = useRef(null);

            const showTooltip = () => {
                if (triggerRef.current) {
                    const rect = triggerRef.current.getBoundingClientRect();
                    let top = 0, left = 0;
                    if (position === 'top') { top = rect.top - 8; left = rect.left + rect.width / 2; }
                    else if (position === 'bottom') { top = rect.bottom + 8; left = rect.left + rect.width / 2; }
                    else if (position === 'left') { top = rect.top + rect.height / 2; left = rect.left - 8; }
                    else if (position === 'right') { top = rect.top + rect.height / 2; left = rect.right + 8; }
                    setCoords({ top, left });
                }
                setIsVisible(true);
            };

            return (
                <div 
                    className="inline-flex items-center justify-center cursor-help"
                    ref={triggerRef}
                    onMouseEnter={showTooltip}
                    onMouseLeave={() => setIsVisible(false)}
                    onTouchStart={showTooltip}
                    onTouchEnd={() => setTimeout(() => setIsVisible(false), 1500)}

                localStorage.setItem('gigaom_v6_dark', JSON.stringify(darkMode));
            }, [darkMode]);

            useEffect(() => {
                if (!isInitialized) return;
                const url = new URL(window.location);
                url.searchParams.set('v', selectedIds.join(','));
                url.searchParams.set('w', `${weights.key},${weights.emg},${weights.bus}`);
                window.history.replaceState({}, '', url);
                
                localStorage.setItem('gigaom_v6_sel', JSON.stringify(selectedIds));
                localStorage.setItem('gigaom_v6_wgt', JSON.stringify(weights));
            }, [selectedIds, weights, isInitialized]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };
            const copyShareLink = () => { navigator.clipboard.writeText(window.location.href); showToast("🔗 คัดลอกลิงก์เรียบร้อยแล้ว!"); };

            const exportToCSV = () => {
                const selected = processedData.filter(v => selectedIds.includes(v.id));
                if(selected.length === 0) { showToast("⚠️ กรุณาเลือก Vendor อย่างน้อย 1 รายการ"); return; }
                
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
                csvContent += "Vendor Name,Group,Markets,Key Features Score,Emerging Tech Score,Business Score,Weighted Avg (Total),YoY Growth\n";
                
                selected.forEach(v => {
                    csvContent += `"${v.name}","${v.group}","${v.markets.join(', ')}",${v.scores.key},${v.scores.emg},${v.scores.bus},${v.avg},${v.yoyDiff}\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `GigaOm_Radar_Export_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("📥 Export CSV สำเร็จ!");
            };

            const handleWeightChange = (key, val) => {
                const newValue = parseInt(val);
                const others = Object.keys(weights).filter(k => k !== key);
                const targetOthersSum = 100 - newValue;
                const currentOthersSum = weights[others[0]] + weights[others[1]];
                let newWeights = { ...weights, [key]: newValue };
                if (currentOthersSum > 0) {
                    newWeights[others[0]] = Math.round((weights[others[0]] / currentOthersSum) * targetOthersSum);
                    newWeights[others[1]] = targetOthersSum - newWeights[others[0]];
                } else {
                    newWeights[others[0]] = Math.floor(targetOthersSum / 2);
                    newWeights[others[1]] = targetOthersSum - newWeights[others[0]];
                }
                setWeights(newWeights);
            };

            const handleMarketChange = (e) => {
                const newMarket = e.target.value;
                setFilterMarket(newMarket);
                if (newMarket !== 'All') {
                    const validVendorIds = VENDOR_DATA.filter(v => v.markets.some(m => m.includes(newMarket))).map(v => v.id);
                    setSelectedIds(prev => prev.filter(id => validVendorIds.includes(id)));
                    setBaselineId(prev => (prev && !validVendorIds.includes(prev)) ? null : prev);
                    setExpandedId(prev => (prev && !validVendorIds.includes(prev)) ? null : prev);
                }
            };

            const requestSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') direction = 'asc';
                setSortConfig({ key, direction });
            };

            const toggleVendorSelection = (v_id) => {
                if(selectedIds.includes(v_id)) {
                    setSelectedIds(selectedIds.filter(id => id !== v_id));
                    if(baselineId === v_id) setBaselineId(null);
                } else {
                    if(selectedIds.length < 5) setSelectedIds([...selectedIds, v_id]);
                    else showToast("เปรียบเทียบได้สูงสุด 5 รายการ");
                }
            };

            const processedData = useMemo(() => {
                let data = VENDOR_DATA.map(v => {
                    const avg = (((v.scores.key * weights.key) + (v.scores.emg * weights.emg) + (v.scores.bus * weights.bus)) / 100);
                    const defaultAvg = (((v.scores.key * 45) + (v.scores.emg * 15) + (v.scores.bus * 40)) / 100);
                    
                    let isScaleMatch = false;
                    if (networkScale === 'Small' && v.markets.includes('SMB')) isScaleMatch = true;
                    if (networkScale === 'Medium' && v.markets.includes('Enterprise')) isScaleMatch = true;
                    if (networkScale === 'Large' && (v.markets.includes('CSP') || v.markets.includes('Telcos') || v.markets.includes('Carrier'))) isScaleMatch = true;

                    return { ...v, avg: avg.toFixed(2), rawAvg: avg, yoyDiff: (defaultAvg - v.prev).toFixed(2), isScaleMatch };
                }).filter(v => filterMarket === 'All' || v.markets.some(m => m.includes(filterMarket)));

                data.sort((a, b) => {
                    if (sortConfig.key === 'name') return sortConfig.direction === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
                    let aValue = sortConfig.key === 'key' ? a.scores.key : (sortConfig.key === 'emg' ? a.scores.emg : (sortConfig.key === 'bus' ? a.scores.bus : (sortConfig.key === 'yoyDiff' ? parseFloat(a.yoyDiff) : a.rawAvg)));
                    let bValue = sortConfig.key === 'key' ? b.scores.key : (sortConfig.key === 'emg' ? b.scores.emg : (sortConfig.key === 'bus' ? b.scores.bus : (sortConfig.key === 'yoyDiff' ? parseFloat(b.yoyDiff) : b.rawAvg)));
                    if (aValue === bValue) return a.name.localeCompare(b.name);
                    return sortConfig.direction === 'asc' ? aValue - bValue : bValue - aValue;
                });
                
                if (baselineId) {
                    const baseline = data.find(v => v.id === baselineId);
                    if (baseline) {
                        data = data.map(v => ({
                            ...v,
                            gap: {
                                key: (v.scores.key - baseline.scores.key).toFixed(1), emg: (v.scores.emg - baseline.scores.emg).toFixed(1),
                                bus: (v.scores.bus - baseline.scores.bus).toFixed(1), avg: (v.rawAvg - baseline.rawAvg).toFixed(2)
                            }
                        }));
                    }
                }
                return data;
            }, [weights, filterMarket, baselineId, sortConfig, networkScale]);

            useEffect(() => {
                if (!isInitialized || !chartRef.current) return;
                const ctx = chartRef.current.getContext('2d');
                const selected = processedData.filter(v => selectedIds.includes(v.id));
                const isMobile = window.innerWidth < 768;
                const fontSize = isMobile ? 10 : 12;
                
                let config = {};
                if (chartType === 'quadrant') {
                    config = {
                        type: 'scatter',
                        data: {
                            datasets: selected.map((v) => {
                                const isBaseline = baselineId === v.id;
                                return {
                                    label: v.name, data: [{ x: v.quadrant.x, y: v.quadrant.y }],
                                    backgroundColor: CHART_COLORS[selectedIds.indexOf(v.id) % 5],
                                    borderColor: isBaseline ? (darkMode ? '#FFF' : '#000') : 'white',
                                    borderWidth: isBaseline ? 3 : 2, pointRadius: (isMobile ? 6 : 8) + (v.rawAvg * (isMobile ? 2.5 : 3.5)), pointHoverRadius: (isMobile ? 8 : 10) + (v.rawAvg * (isMobile ? 2.5 : 3.5))
                                };
                            })
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            animation: { duration: 400 },
                            plugins: {
                                tooltip: { titleFont: { size: fontSize+2, family: 'Prompt' }, bodyFont: { size: fontSize+1, family: 'Prompt' }, padding: 12, callbacks: { label: (ctx) => `${ctx.dataset.label} (Score: ${processedData.find(s=>s.name===ctx.dataset.label).avg})` }},
                                legend: { position: 'top', labels: { boxWidth: 12, font: {size: fontSize, family: 'Prompt'} } }
                            },
                            scales: {
                                x: { min: -10, max: 10, title: { display: true, text: isMobile?'Feature <-> Platform':'Feature Play <-------------> Platform Play', font: {size: fontSize, weight: 'bold'}, color: '#94a3b8' }, grid: { color: (ctx) => ctx.tick.value === 0 ? (darkMode ? '#475569' : '#cbd5e1') : (darkMode ? '#1e293b' : '#f1f5f9'), lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 } },
                                y: { min: -10, max: 10, title: { display: true, text: isMobile?'Innovate <-> Mature':'Innovation <-------------> Maturity', font: {size: fontSize, weight: 'bold'}, color: '#94a3b8' }, grid: { color: (ctx) => ctx.tick.value === 0 ? (darkMode ? '#475569' : '#cbd5e1') : (darkMode ? '#1e293b' : '#f1f5f9'), lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 } }
                            }
                        }
                    };
                } else {
                    config = {
                        type: chartType,
                        data: {
                            labels: ['Key Features', 'Emerging Tech', 'Business Criteria'],
                            datasets: selected.map((v) => {
                                const isBaseline = baselineId === v.id;
                                return {
                                    label: v.name, data: [v.scores.key, v.scores.emg, v.scores.bus],
                                    borderColor: isBaseline ? (darkMode ? '#FFF' : '#000') : CHART_COLORS[selectedIds.indexOf(v.id) % 5],
                                    backgroundColor: chartType === 'bar' ? CHART_COLORS[selectedIds.indexOf(v.id) % 5] : CHART_BG[selectedIds.indexOf(v.id) % 5],
                                    borderWidth: isBaseline ? 3 : 2, pointRadius: isMobile?4:6, borderRadius: chartType === 'bar' ? 8 : 0
                                };
                            })
                        },
                        options: { 
                            responsive: true, maintainAspectRatio: false, 
                            animation: { duration: 400 },
                            scales: { 
                                r: chartType === 'radar' ? { beginAtZero: true, max: 5, grid: { color: darkMode ? '#334155' : '#E2E8F0' }, pointLabels: { font: {size: fontSize, family: 'Prompt'} } } : undefined,
                                y: chartType === 'bar' ? { beginAtZero: true, max: 5, grid: { color: darkMode ? '#334155' : '#E2E8F0' } } : undefined
                            },
                            plugins: { 
                                tooltip: { titleFont: { size: fontSize+2, family: 'Prompt' }, bodyFont: { size: fontSize+1, family: 'Prompt' }, padding: 12 },
                                legend: { position: 'top', labels: { boxWidth: 12, font: {size: fontSize, family: 'Prompt'} } } 
                            }
                        }
                    };
                }

                if (chartInstance.current && currentChartTypeRef.current === chartType) {
                    chartInstance.current.data = config.data;
                    chartInstance.current.options = config.options;
                    chartInstance.current.update('none');
                } else {
                    if (chartInstance.current) chartInstance.current.destroy();
                    chartInstance.current = new Chart(ctx, config);
                    currentChartTypeRef.current = chartType;
                }
            }, [selectedIds, processedData, darkMode, chartType, baselineId, isInitialized]);

            if (!isInitialized) return null;

            return (
                <div className="min-h-screen flex flex-col p-2 md:p-4 lg:p-6 gap-4 lg:gap-6 max-w-[1600px] mx-auto relative z-10">
                    {/* Ambient Glow Effects */}
                    <div className="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-blue-500/10 dark:bg-blue-600/10 blur-[120px] pointer-events-none z-[-1]"></div>
                    <div className="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-emerald-500/10 dark:bg-teal-600/10 blur-[120px] pointer-events-none z-[-1]"></div>

                    <SummaryModal 
                        isOpen={showSummaryModal} 
                        onClose={() => setShowSummaryModal(false)} 
                        selectedVendors={processedData.filter(v => selectedIds.includes(v.id))} 
                        weights={weights} 
                        baselineId={baselineId} 
                    />

                    {toast && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[110] bg-slate-800 text-white px-6 py-4 rounded-full shadow-2xl flex items-center gap-3 toast-animate border border-slate-700 w-max max-w-[90vw]">
                            <Icon name="check-circle" className="w-5 h-5 md:w-6 md:h-6 text-emerald-400 shrink-0" /> <span className="font-bold text-sm md:text-base truncate">{toast}</span>
                        </div>
                    )}

                    <header className="flex flex-col xl:flex-row justify-between items-start xl:items-center bg-navy text-white px-6 py-5 md:px-8 md:py-6 rounded-[2rem] shadow-2xl no-print gap-4 xl:gap-0 border border-slate-800">
                        <div className="flex items-center gap-4 w-full xl:w-auto">
                            <div className="p-3 md:p-4 bg-gradient-to-br from-accent to-blue-700 rounded-2xl shrink-0 shadow-lg border border-blue-500/30">
                                <Icon name="activity" className="text-white w-6 h-6 md:w-8 md:h-8" />
                            </div>
                            <div className="flex-1">
                                <h1 className="text-xl md:text-2xl lg:text-3xl font-black tracking-tight uppercase leading-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-300">GigaOm Radar Analyst</h1>
                                <p className="text-[10px] md:text-xs text-blue-300 uppercase tracking-widest font-bold mt-0.5 md:mt-1">Interactive Enterprise Dashboard</p>
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-2 md:gap-3 w-full xl:w-auto justify-end">
                            <button onClick={() => setShowMobileControls(!showMobileControls)} className="xl:hidden w-full mb-2 bg-slate-800 hover:bg-slate-700 px-4 py-3.5 rounded-xl font-bold text-sm flex justify-center items-center gap-2 shadow-lg transition-all text-white active:scale-95 border border-slate-700">
                                <Icon name="sliders" className="w-5 h-5 text-accent" /> {showMobileControls ? 'Hide Settings' : '🛠️ Settings'}
                            </button>
                            
                            <Tooltip content="Auto-Generate Text Summary for Executives">
                                <button onClick={() => setShowSummaryModal(true)} className="flex-1 sm:flex-none justify-center bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 px-4 md:px-5 py-3 md:py-3.5 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 shadow-lg transition-all text-white border border-purple-400/30 active:scale-95">
                                    <Icon name="sparkles" className="w-4 h-4 md:w-5 md:h-5 text-purple-200" /> <span className="hidden sm:inline">AI Report</span>
                                </button>
                            </Tooltip>

                            <Tooltip content="Copy URL with current settings">
                                <button onClick={copyShareLink} className="flex-1 sm:flex-none justify-center bg-slate-800/80 hover:bg-slate-700 px-4 md:px-4 py-3 md:py-3.5 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 shadow-lg transition-all text-slate-300 border border-slate-700/50 hover:border-slate-500 active:scale-95">
                                    <Icon name="link" className="w-4 h-4 md:w-5 md:h-5 text-accent" /> <span className="hidden sm:inline">Share</span>
                                </button>
                            </Tooltip>
                            
                            <Tooltip content="Toggle Dark/Light Mode">
                                <button onClick={() => setDarkMode(!darkMode)} className="flex-1 sm:flex-none flex justify-center p-3 md:p-3.5 rounded-xl bg-slate-800/80 hover:bg-slate-700 transition-all text-slate-300 border border-slate-700/50 hover:border-slate-500 active:scale-90">
                                    <Icon name="sun" className={`w-4 h-4 md:w-5 md:h-5 text-yellow-400 ${darkMode ? 'block' : 'hidden'}`} />
                                    <Icon name="moon" className={`w-4 h-4 md:w-5 md:h-5 text-yellow-400 ${darkMode ? 'hidden' : 'block'}`} />
                                </button>
                            </Tooltip>
                            
                            <Tooltip content="Download Data Table as Excel/CSV">
                                <button onClick={exportToCSV} className="hidden md:flex bg-slate-800/80 hover:bg-slate-700 px-4 py-3.5 rounded-xl font-bold text-sm items-center gap-2 shadow-lg transition-all text-slate-300 border border-slate-700/50 hover:border-slate-500 active:scale-95">
                                    <Icon name="download" className="w-4 h-4 md:w-5 md:h-5 text-emerald-400" /> CSV
                                </button>
                            </Tooltip>

                            <Tooltip content="Print current view as PDF">
                                <button onClick={() => window.print()} className="hidden md:flex bg-gradient-to-r from-accent to-blue-600 hover:from-blue-600 hover:to-blue-700 px-5 py-3.5 rounded-xl font-bold text-sm items-center gap-2 shadow-lg transition-all text-white active:scale-95 border border-blue-400/30">
                                    <Icon name="printer" className="w-5 h-5" /> PDF
                                </button>
                            </Tooltip>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 xl:grid-cols-12 gap-4 lg:gap-6 items-start">
                        <aside className={`xl:col-span-3 space-y-4 lg:space-y-6 no-print xl:sticky xl:top-6 transition-all duration-300 origin-top ${showMobileControls ? 'block' : 'hidden xl:block'}`}>
                            
                            <div className="glass-morphism p-5 md:p-6 rounded-[1.5rem]">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><Icon name="crosshair" className="w-4 h-4 text-accent" /> 1. Strategic Presets</h2>
                                    <button onClick={() => setWeights({key:45, emg:15, bus:40})} className="text-[10px] bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-md text-slate-500 hover:text-accent font-bold transition-colors active:scale-90">Reset</button>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    {STRATEGIC_PRESETS.map((p, idx) => (
                                        <Tooltip key={idx} content={p.desc} position="top">
                                            <button onClick={() => {setWeights(p.w); showToast(`View: ${p.label}`);}} className="w-full p-3 rounded-2xl text-left transition-all border border-slate-200 dark:border-slate-700 bg-white/40 dark:bg-slate-800/40 hover:border-accent hover:bg-blue-50 dark:hover:bg-blue-900/20 shadow-sm group active:scale-95">
                                                <div className="text-[11px] font-bold dark:text-white flex items-center gap-1.5 group-hover:text-accent"><Icon name={p.icon} className={`w-3.5 h-3.5 shrink-0 ${p.color}`} /> <span className="truncate">{p.label}</span></div>
                                            </button>
                                        </Tooltip>
                                    ))}
                                </div>
                            </div>

                            <div className="glass-morphism p-5 md:p-6 rounded-[1.5rem]">
                                <h2 className="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-widest mb-5 flex items-center gap-2"><Icon name="sliders" className="w-4 h-4 text-accent" /> 2. Weight Allocation</h2>
                                {['key', 'emg', 'bus'].map((k, i) => (
                                    <div key={k} className="mb-5 last:mb-0">
                                        <div className="flex justify-between items-center text-[10px] font-bold mb-3 uppercase">
                                            <Tooltip content={k==='key'?"Dynamic Discovery, Visualization, Traffic Analysis":k==='emg'?"eBPF, AI/LLM Advisor, Digital Twin":"Scalability, Ease of Use, Cost Transparency"} position="right">
                                                <span className="flex items-center gap-1.5 cursor-help dark:text-slate-300">{k==='key'?'Key Features':k==='emg'?'Emerging Tech':'Business Criteria'} <Icon name="info" className="w-3 h-3 text-slate-400" /></span>
                                            </Tooltip>
                                            <span className={`px-2 py-1 rounded-lg font-black ${i===0?'bg-blue-100 text-blue-600':i===1?'bg-purple-100 text-purple-600':'bg-emerald-100 text-emerald-600'}`}>{weights[k]}%</span>
                                        </div>
                                        <input type="range" className="w-full custom-slider h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none" style={{'--accent': i===0?'#3b82f6':i===1?'#9333ea':'#10b981'}} value={weights[k]} onChange={(e) => handleWeightChange(k, e.target.value)} />
                                    </div>
                                ))}
                            </div>

                            <div className="glass-morphism p-5 md:p-6 rounded-[1.5rem]">
                                <h2 className="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="calculator" className="w-4 h-4 text-emerald-500" /> 3. ROI & Scale Estimator</h2>
                                <p className="text-[10px] text-slate-500 dark:text-slate-400 mb-3 leading-relaxed">Select organization size to highlight the most cost-effective Vendors for your network scale.</p>
                                <select value={networkScale} onChange={(e) => setNetworkScale(e.target.value)} className="w-full bg-slate-50 dark:bg-slate-800 text-xs font-bold text-slate-700 dark:text-slate-200 px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer">
                                    <option value="None">Show All (Default)</option>
                                    <option value="Small">🔹 SMB (&lt; 1,000 Nodes)</option>
                                    <option value="Medium">🏢 Enterprise (1k - 10k Nodes)</option>
                                    <option value="Large">🌐 Carrier / CSP (&gt; 10,000 Nodes)</option>
                                </select>
                            </div>

                            <div className="glass-morphism p-5 md:p-6 rounded-[1.5rem] flex flex-col max-h-[420px]">
                                <div className="flex justify-between items-center mb-4 shrink-0 flex-wrap gap-2">
                                    <h2 className="text-[10px] md:text-xs font-black text-slate-500 uppercase tracking-widest flex items-center gap-2 w-full"><Icon name="check-square" className="w-4 h-4 text-accent" /> 4. Vendors Filter</h2>
                                    <select value={filterMarket} onChange={handleMarketChange} className="bg-slate-100 dark:bg-slate-800 text-[10px] font-bold text-slate-600 dark:text-slate-300 px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 outline-none cursor-pointer focus:ring-2 focus:ring-accent w-full mb-1">
                                        <option value="All">🌐 All Markets</option>
                                        <option value="Enterprise">🏢 Enterprise</option>
                                        <option value="CSP">☁️ CSP / Cloud</option>
                                        <option value="Telcos">📡 Telcos</option>
                                        <option value="SMB">🏪 SMB</option>
                                    </select>
                                    <div className="flex justify-between items-center w-full">
                                        <button onClick={() => {setSelectedIds([]); setBaselineId(null);}} className="bg-red-50 dark:bg-red-900/20 px-2.5 py-1.5 rounded-lg text-[10px] font-bold text-red-500 hover:bg-red-100 transition-colors active:scale-90">Clear</button>
                                        <span className="bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-lg text-[10px] font-black dark:text-white border border-slate-200 dark:border-slate-700">{selectedIds.length}/5 Selected</span>
                                    </div>
                                </div>
                                <div className="space-y-2 overflow-y-auto pr-1 custom-scrollbar">
                                    {processedData.map((v) => {
                                        const isSelected = selectedIds.includes(v.id);
                                        const showScaleHighlight = networkScale !== 'None' && v.isScaleMatch;
                                        return (
                                            <label key={v.id} className={`flex items-center justify-between p-3 rounded-2xl cursor-pointer transition-all border-2 relative overflow-hidden ${isSelected ? 'border-accent bg-blue-50/50 dark:bg-blue-900/20 shadow-sm' : 'border-transparent bg-white dark:bg-slate-900 shadow-sm hover:bg-slate-50 dark:hover:bg-slate-800 border-slate-100 dark:border-slate-800'} ${showScaleHighlight && !isSelected ? 'ring-2 ring-emerald-400/50 bg-emerald-50/30' : ''}`}>
                                                {showScaleHighlight && <div className="absolute top-0 right-0 bg-emerald-500 text-white text-[7px] font-black px-1.5 py-0.5 rounded-bl-md">ROI FIT</div>}
                                                <div className="flex items-center gap-2">
                                                    <div className={`w-4 h-4 rounded border flex items-center justify-center transition-colors ${isSelected?'bg-accent border-accent':'border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-800'}`}>
                                                        <Icon name="check" className={`w-3 h-3 text-white ${isSelected ? 'block' : 'hidden'}`} />
                                                    </div>
                                                    <input type="checkbox" checked={isSelected} onChange={() => toggleVendorSelection(v.id)} className="hidden" />
                                                    <div className="flex flex-col">
                                                        <span className="text-[11px] font-bold dark:text-white truncate max-w-[120px]">{v.name}</span>
                                                        <span className="text-[8px] text-slate-400 font-semibold">{v.group} • {v.mover}</span>
                                                    </div>
                                                </div>
                                                {isSelected && <div className="w-2.5 h-2.5 rounded-full shadow-sm shrink-0 border border-white/50" style={{backgroundColor: CHART_COLORS[selectedIds.indexOf(v.id) % 5]}}></div>}
                                            </label>
                                        )
                                    })}
                                </div>
                            </div>
                        </aside>

                        <main className="xl:col-span-9 space-y-4 lg:space-y-6 flex flex-col">
                            <div className="grid grid-cols-1 lg:grid-cols-5 gap-4 lg:gap-6">
                                <div className="lg:col-span-3 glass-morphism p-5 md:p-8 rounded-[2rem] flex flex-col bg-white/70 dark:bg-slate-900/70 border border-white dark:border-slate-800">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
                                        <h3 className="font-black text-sm md:text-lg flex items-center gap-2 dark:text-white"><Icon name="pie-chart" className="text-accent w-5 h-5 md:w-6 md:h-6" /> Data Visualization</h3>
                                        <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl w-full sm:w-auto border border-slate-200 dark:border-slate-700">
                                            {['quadrant', 'radar', 'bar'].map(t => (
                                                <button key={t} onClick={() => setChartType(t)} className={`flex-1 sm:flex-none px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all active:scale-95 ${chartType === t ? 'bg-white dark:bg-slate-600 shadow-md text-accent dark:text-white' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="chart-container flex-1"><canvas ref={chartRef}></canvas></div>
                                </div>

                                <div className="lg:col-span-2 flex flex-col gap-4 lg:gap-6">
                                    <div className={`p-6 rounded-[2rem] text-white shadow-xl relative overflow-hidden border transition-all duration-500 ${baselineId ? 'bg-gradient-to-br from-emerald-500 to-teal-700 border-emerald-400/50' : 'bg-gradient-to-br from-slate-700 to-navy border-slate-600'}`}>
                                        <div className="absolute top-0 right-0 -mt-4 -mr-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
                                        <h3 className="font-black text-xs flex items-center gap-2 mb-3 opacity-90 uppercase tracking-widest relative z-10">
                                            <Icon name="target" className={`w-5 h-5 ${baselineId ? 'animate-pulse' : ''}`} /> 
                                            {baselineId ? 'Baseline Mode Active' : 'Gap Analysis Engine'}
                                        </h3>
                                        <p className="text-xs leading-relaxed font-semibold relative z-10">
                                            {baselineId 
                                                ? <span>Comparing technical gaps against <b>{processedData.find(v=>v.id===baselineId)?.name}</b>. Detailed metrics in the table below.</span> 
                                                : <span>Click the <Icon name="target" className="w-3 h-3 inline mx-1" /> icon in the matrix to set a vendor as the comparison baseline.</span>
                                            }
                                        </p>
                                    </div>
                                    
                                    <div className="glass-morphism p-6 rounded-[2rem] flex-1 overflow-y-auto max-h-[300px] custom-scrollbar">
                                        <h3 className="font-black text-[10px] text-slate-500 uppercase tracking-widest border-b border-slate-100 dark:border-slate-800 pb-2 mb-4 flex items-center gap-2"><Icon name="zap" className="w-4 h-4 text-accent" /> Key Strengths</h3>
                                        <div className="space-y-3">
                                            {processedData.filter(v => selectedIds.includes(v.id)).map(v => (
                                                <div key={v.id} className="p-4 bg-slate-50 dark:bg-slate-800/60 rounded-xl border border-slate-100 dark:border-slate-700 relative overflow-hidden group">
                                                    <div className="absolute top-0 left-0 w-1 h-full" style={{backgroundColor: CHART_COLORS[selectedIds.indexOf(v.id) % 5]}}></div>
                                                    <div className="pl-2">
                                                        <div className="flex justify-between items-center mb-1 font-bold">
                                                            <span className="text-[11px] md:text-[12px] dark:text-white truncate">{v.name}</span>
                                                        </div>
                                                        <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-snug">{v.strengths}</p>
                                                    </div>
                                                </div>
                                            ))}
                                            {selectedIds.length === 0 && <div className="text-center py-10 text-slate-400 text-xs font-medium italic">No vendors selected for analysis</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-morphism rounded-[2rem] shadow-sm overflow-hidden flex-1 border border-slate-200 dark:border-slate-800 relative bg-white/70 dark:bg-slate-900/70">
                                <div className="p-5 bg-slate-50/80 dark:bg-slate-800/80 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-slate-200 dark:border-slate-700 gap-3">
                                    <h3 className="font-black text-sm md:text-base dark:text-white uppercase tracking-tight flex items-center gap-2"><Icon name="table" className="w-5 h-5 text-accent" /> Comparison Matrix</h3>
                                    <div className="flex gap-2 items-center w-full sm:w-auto">
                                        {baselineId && (
                                            <button onClick={() => setBaselineId(null)} className="text-[10px] bg-red-100 text-red-600 px-3 py-1.5 rounded-lg font-bold hover:bg-red-200 transition-all uppercase flex items-center gap-1.5 border border-red-200">
                                                <Icon name="x-circle" className="w-3.5 h-3.5" /> Clear 🎯
                                            </button>
                                        )}
                                        <span className="text-[10px] text-slate-500 font-bold bg-white dark:bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm ml-auto">HEAD TO SORT</span>
                                    </div>
                                </div>
                                
                                <div className="table-wrapper max-h-[550px] custom-scrollbar">
                                    <table className="w-full text-left border-collapse min-w-[700px]">
                                        <thead className="text-slate-500 uppercase text-[10px] font-black tracking-widest sticky-header shadow-sm bg-slate-100 dark:bg-slate-900">
                                            <tr>
                                                <th className="px-6 py-4 md:py-5 cursor-pointer hover:text-accent transition-colors sticky-col" onClick={() => requestSort('name')}>
                                                    <div className="flex items-center gap-2">Vendor & Actions {sortConfig.key === 'name' && <Icon name={sortConfig.direction==='asc'?'chevron-up':'chevron-down'} className="w-3.5 h-3.5" />}</div>
                                                </th>
                                                <th className="px-3 py-5 text-center">
                                                    <Tooltip content="Dynamic Discovery, Visualization, Traffic Analysis, Application Monitoring" position="bottom">
                                                        <div className="flex items-center justify-center gap-1 cursor-pointer hover:text-accent" onClick={() => requestSort('key')}>Key <Icon name="info" className="w-3 h-3 opacity-30" /></div>
                                                    </Tooltip>
                                                </th>
                                                <th className="px-3 py-5 text-center">
                                                    <Tooltip content="eBPF, AI/ML Advisor, Network Modeling, Digital Twin" position="bottom">
                                                        <div className="flex items-center justify-center gap-1 cursor-pointer hover:text-accent" onClick={() => requestSort('emg')}>Emg <Icon name="info" className="w-3 h-3 opacity-30" /></div>
                                                    </Tooltip>
                                                </th>
                                                <th className="px-3 py-5 text-center">
                                                    <Tooltip content="Scalability, Flexibility, Ease of Use, Ecosystem, Cost" position="bottom">
                                                        <div className="flex items-center justify-center gap-1 cursor-pointer hover:text-accent" onClick={() => requestSort('bus')}>Bus <Icon name="info" className="w-3 h-3 opacity-30" /></div>
                                                    </Tooltip>
                                                </th>
                                                <th className="px-4 py-5 bg-blue-50/60 dark:bg-blue-900/10 text-accent text-center cursor-pointer hover:bg-blue-100" onClick={() => requestSort('rawAvg')}>
                                                    {baselineId ? 'GAP %' : 'AVG %'}
                                                </th>
                                                <th className="px-3 py-5 text-center cursor-pointer hover:text-accent" onClick={() => requestSort('yoyDiff')}>YoY %</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                                            {processedData.map((v) => {
                                                const isSelected = selectedIds.includes(v.id);
                                                const dotColor = isSelected ? CHART_COLORS[selectedIds.indexOf(v.id) % 5] : 'transparent';
                                                
                                                return (
                                                <React.Fragment key={v.id}>
                                                <tr className={`transition-all bg-white dark:bg-slate-950 ${baselineId === v.id ? 'bg-emerald-50/50 dark:bg-emerald-900/10 shadow-inner' : 'hover:bg-slate-50 dark:hover:bg-slate-800/40'}`}>
                                                    <td className="px-6 py-4 sticky-col bg-inherit whitespace-nowrap">
                                                        <div className="flex items-center gap-2">
                                                            <div className="flex gap-1.5 opacity-80">
                                                                <button onClick={() => setExpandedId(expandedId === v.id ? null : v.id)} className={`p-1.5 rounded-lg border shadow-sm transition-all active:scale-90 ${expandedId===v.id?'bg-slate-200 dark:bg-slate-700':'bg-white dark:bg-slate-800'}`}>
                                                                    <Icon name={expandedId===v.id ? "minus" : "plus"} className="w-3.5 h-3.5" />
                                                                </button>
                                                                <button onClick={() => setBaselineId(baselineId === v.id ? null : v.id)} className={`p-1.5 rounded-lg border shadow-sm transition-all active:scale-90 ${baselineId===v.id?'bg-emerald-500 text-white border-emerald-500 scale-105':'text-slate-400 bg-white dark:bg-slate-800'}`}>
                                                                    <Icon name="target" className="w-3.5 h-3.5" />
                                                                </button>
                                                            </div>
                                                            <div className="font-bold text-[11px] md:text-[13px] dark:text-white flex items-center gap-2 pl-1">
                                                                <div className={`w-2.5 h-2.5 rounded-full border shrink-0 ${isSelected ? 'border-transparent shadow-md' : 'border-slate-300 dark:border-slate-600 shadow-inner'}`} style={{backgroundColor: dotColor}}></div> 
                                                                {v.name} 
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-3 py-4 text-center text-[12px] font-medium"><span className={baselineId && baselineId!==v.id?parseFloat(v.gap.key)>0?'text-emerald-500 font-bold':parseFloat(v.gap.key)<0?'text-red-500 font-bold':'text-slate-400':''}>{baselineId?v.gap.key:v.scores.key}</span></td>
                                                    <td className="px-3 py-4 text-center text-[12px] font-medium"><span className={baselineId && baselineId!==v.id?parseFloat(v.gap.emg)>0?'text-emerald-500 font-bold':parseFloat(v.gap.emg)<0?'text-red-500 font-bold':'text-slate-400':''}>{baselineId?v.gap.emg:v.scores.emg}</span></td>
                                                    <td className="px-3 py-4 text-center text-[12px] font-medium"><span className={baselineId && baselineId!==v.id?parseFloat(v.gap.bus)>0?'text-emerald-500 font-bold':parseFloat(v.gap.bus)<0?'text-red-500 font-bold':'text-slate-400':''}>{baselineId?v.gap.bus:v.scores.bus}</span></td>
                                                    <td className="px-4 py-4 text-center bg-blue-50/50 dark:bg-blue-900/10 font-black text-[13px] text-accent">
                                                        <span className={baselineId && baselineId!==v.id?parseFloat(v.gap.avg)>0?'text-emerald-500':parseFloat(v.gap.avg)<0?'text-red-500':'text-slate-400':''}>{baselineId?v.gap.avg:v.avg}</span>
                                                    </td>
                                                    <td className="px-3 py-4 text-center">
                                                        <span className={`inline-flex items-center font-bold text-[10px] px-2 py-1 rounded-md border ${parseFloat(v.yoyDiff) > 0 ? 'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30' : 'bg-slate-50 text-slate-500 border-slate-200 dark:bg-slate-800'}`}>
                                                            {parseFloat(v.yoyDiff) > 0 ? '+' : ''}{v.yoyDiff}
                                                        </span>
                                                    </td>
                                                </tr>
                                                {expandedId === v.id && (
                                                    <tr className="bg-slate-50/40 dark:bg-slate-900/40 border-b-2 border-accent/10">
                                                        <td colSpan="6" className="p-8">
                                                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8 bg-white dark:bg-slate-950 p-6 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-xl">
                                                                <div className="space-y-4">
                                                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2">Key Breakdown</div>
                                                                    <div><span className="text-[10px] text-slate-500 font-bold mb-1.5 block">Discovery & Map</span> <MicroBar score={v.sub.key.discovery} colorClass="bg-blue-500" /></div>
                                                                    <div><span className="text-[10px] text-slate-500 font-bold mb-1.5 block">Traffic Analysis</span> <MicroBar score={v.sub.key.traffic} colorClass="bg-blue-500" /></div>
                                                                </div>
                                                                <div className="space-y-4">
                                                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2">Innovation Tech</div>
                                                                    <div><span className="text-[10px] text-slate-500 font-bold mb-1.5 block">AI / LLM Advisor</span> <MicroBar score={v.sub.emg.ai} colorClass="bg-purple-500" /></div>
                                                                    <div><span className="text-[10px] text-slate-500 font-bold mb-1.5 block">eBPF Monitoring</span> <MicroBar score={v.sub.emg.ebpf} colorClass="bg-purple-500" /></div>
                                                                </div>
                                                                <div className="space-y-4">
                                                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2">Business ROI</div>
                                                                    <div><span className="text-[10px] text-slate-500 font-bold mb-1.5 block">Deployment Ease</span> <MicroBar score={v.sub.bus.ease} colorClass="bg-emerald-500" /></div>
                                                                    <div><span className="text-[10px] text-slate-500 font-bold mb-1.5 block">Cost Transparency</span> <MicroBar score={v.sub.bus.cost} colorClass="bg-emerald-500" /></div>
                                                                </div>
                                                                <div className="bg-slate-50 dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-700 flex flex-col justify-center gap-4">
                                                                    <div className="flex justify-between items-center"><span className="text-[10px] text-slate-500 font-bold uppercase">TTV</span><span className={`text-[10px] font-black px-2 py-1 rounded-lg ${v.matrix.ttv === 'Fast' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{v.matrix.ttv}</span></div>
                                                                    <div className="flex justify-between items-center"><span className="text-[10px] text-slate-500 font-bold uppercase">Learning</span><span className={`text-[10px] font-black px-2 py-1 rounded-lg ${v.matrix.learning === 'Low' ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{v.matrix.learning}</span></div>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                )}
                                                </React.Fragment>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    </div>

                    {/* --- เพิ่มรูปภาพ GigaOm Radar ตรงนี้ --- */}
                    <div className="mt-8 glass-morphism p-6 md:p-8 rounded-[2rem] flex flex-col items-center justify-center bg-white/70 dark:bg-slate-900/70 border border-slate-200 dark:border-slate-800 shadow-sm no-print">
                        <h2 className="text-xl md:text-2xl font-black mb-6 text-slate-800 dark:text-white uppercase tracking-tight flex items-center gap-3">
                            <Icon name="radar" className="w-6 h-6 text-accent" />
                            GigaOm Radar for Network Observability 2026
                        </h2>
                        
                        {/* ⚠️ นำรูปภาพที่คุณมีมาไว้ในโฟลเดอร์เดียวกับไฟล์ HTML แล้วตั้งชื่อว่า gigaom-radar.jpg */}
                        <img 
                            src="gigaom-radar.jpg" 
                            alt="GigaOm Radar for Network Observability 2026" 
                            className="max-w-full h-auto rounded-xl shadow-lg border border-slate-200 dark:border-slate-700"
                        />
                    </div>

                    <footer className="mt-8 text-center pb-10 opacity-50 no-print">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] flex items-center justify-center gap-2">
                            Powered by <span className="text-accent">IBIGKUNG</span> v6. 2026
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
